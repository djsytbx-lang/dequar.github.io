<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Поддержка</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0f172a;
            color: #e2e8f0;
        }
        .cyberpunk-glow {
            box-shadow: 0 0 15px rgba(16, 185, 129, 0.3);
        }
        .cyberpunk-border {
            border: 1px solid rgba(16, 185, 129, 0.5);
        }
        .animate-fade-in {
            animation: fadeIn 0.5s ease-in-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4 bg-gradient-to-br from-slate-900 to-slate-800">

    <div class="max-w-4xl w-full bg-slate-900/80 backdrop-blur-md rounded-2xl overflow-hidden shadow-2xl border border-slate-700 flex flex-col md:flex-row">
        
        <!-- Image Section -->
        <div class="w-full md:w-1/2 h-64 md:h-auto relative group">
            <img 
                src="https://image.qwenlm.ai/public_source/2169befd-4685-4341-89c9-e4b88f3f5c98/159ca4381-6f3c-4f13-9b22-93f58c33dcf5.png" 
                alt="Cyberpunk Character" 
                class="w-full h-full object-cover transition-transform duration-700 group-hover:scale-105"
            >
            <div class="absolute inset-0 bg-gradient-to-t from-slate-900 to-transparent md:bg-gradient-to-r md:from-transparent md:to-slate-900/50"></div>
        </div>

        <!-- Content Section -->
        <div class="w-full md:w-1/2 p-8 flex flex-col justify-center items-center text-center">
            <h1 class="text-3xl font-bold mb-2 text-emerald-400 tracking-wider uppercase">Поддержка</h1>
            <p class="text-slate-400 mb-8 text-sm">Нажмите кнопку ниже, чтобы скопировать номер для перевода через СБП.</p>
            
            <button 
                id="supportBtn"                onclick="copyNumber()"
                class="w-full py-4 px-6 bg-emerald-600 hover:bg-emerald-500 text-white font-bold rounded-lg transition-all duration-300 transform hover:scale-[1.02] active:scale-95 shadow-lg hover:shadow-emerald-500/30 flex items-center justify-center gap-2 group"
            >
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z" />
                </svg>
                <span id="btnText">Поддержать</span>
            </button>

            <!-- Instructions Container -->
            <div id="instructions" class="hidden mt-8 w-full text-left bg-slate-800/50 p-6 rounded-xl border border-slate-700 animate-fade-in">
                <h3 class="text-emerald-400 font-semibold mb-3 flex items-center gap-2">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                        <path fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7-4a1 1 0 11-2 0 1 1 0 012 0zM9 9a1 1 0 000 2v3a1 1 0 001 1h1a1 1 0 100-2v-3a1 1 0 00-1-1H9z" clip-rule="evenodd" />
                    </svg>
                    Инструкция:
                </h3>
                <p class="text-slate-300 text-sm leading-relaxed">
                    1. Зайдите в свой банк.<br>
                    2. Введите скопированный номер в «отправить по СБП».<br>
                    3. Можете отправить любую сумму.<br>
                    Спасибо за поддержку!
                </p>
            </div>
        </div>
    </div>

    <script>
        function copyNumber() {
            const number = "+79779894624";
            const btnText = document.getElementById('btnText');
            const instructions = document.getElementById('instructions');
            
            // Метод 1: Современный Clipboard API
            if (navigator.clipboard && window.isSecureContext) {
                navigator.clipboard.writeText(number).then(() => {
                    showSuccess();
                }).catch(() => {
                    fallbackCopy();
                });
            } else {
                // Метод 2: Запасной вариант для HTTP и старых браузеров
                fallbackCopy();
            }
            
            function fallbackCopy() {
                // Создаем временное текстовое поле
                const textArea = document.createElement("textarea");
                textArea.value = number;
                textArea.style.position = "fixed";                textArea.style.left = "-9999px";
                document.body.appendChild(textArea);
                textArea.select();
                
                try {
                    document.execCommand('copy');
                    showSuccess();
                } catch (err) {
                    alert("Не удалось скопировать автоматически. Пожалуйста, выделите и скопируйте номер вручную: " + number);
                }
                
                document.body.removeChild(textArea);
            }
            
            function showSuccess() {
                btnText.innerText = "Скопировано!";
                instructions.classList.remove('hidden');
                setTimeout(() => {
                    btnText.innerText = "Поддержать";
                }, 2000);
            }
        }
    </script>
</body>
</html>
